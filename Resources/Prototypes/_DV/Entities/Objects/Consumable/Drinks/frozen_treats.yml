# I SCREAM, YOU SCREAM, WE ALL SCREAM FOR ICE CREAM
- type: entity
  parent: DrinkGlass
  id: DrinkIceCreamAppleCaramel
  suffix: apple caramel ice cream
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: IceCreamAppleCaramel
          Quantity: 30
  - type: Icon
    sprite: _DV/Objects/Consumable/Drinks/frozen_treats/icecream-applecaramel.rsi
    state: icon

