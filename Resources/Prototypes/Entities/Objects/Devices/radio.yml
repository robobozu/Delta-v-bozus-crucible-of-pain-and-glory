- type: entity
  name: handheld radio
  description: A handy handheld radio.
  parent: BaseItem
  id: RadioHandheld
  components:
  - type: TelecomExempt
  - type: RadioMicrophone
    broadcastChannel: Handheld
  - type: RadioSpeaker
    channels:
    - Handheld
  - type: Speech
    speechVerb: Robotic
  - type: Sprite
    sprite: Objects/Devices/communication.rsi
    layers:
    - state: walkietalkie
    - state: walkietalkie-on
    state: walkietalkie
  - type: Item
    sprite: Objects/Devices/communication.rsi
    heldPrefix: walkietalkie
  - type: Tag
    tags:
    - Radio

- type: entity
  name: security radio
  description: A handy security radio.
  parent: [ RadioHandheld, BaseSecurityContraband ]
  id: RadioHandheldSecurity
  components:
  - type: Appearance # DeltaV - radio screen appearance control
  - type: RadioMicrophone
    broadcastChannel: Security
    listenRange: 1
  - type: RadioSpeaker
    channels:
    - Security
  - type: Sprite
    sprite: _DV/Objects/Devices/securityhandy.rsi # DeltaV - resprite security radio
    layers:
    - state: walkietalkie-off # DeltaV - show off screen when radio disabled
    - state: walkietalkie-on # DeltaV - animated screen when radio enabled
      map: ["enum.RadioDeviceVisualLayers.Speaker"]
      visible: false # DeltaV - start with screen off
  - type: Item
    sprite: _DV/Objects/Devices/securityhandy.rsi # DeltaV - resprite security radio
    heldPrefix: walkietalkie
  - type: GenericVisualizer # DeltaV - toggle radio screen overlay
    visuals:
      enum.RadioDeviceVisuals.Speaker:
        enum.RadioDeviceVisualLayers.Speaker:
          True: { visible: true }
          False: { visible: false }
