- type: entity
  parent: BaseSword
  id: SilverSword
  name: silver sword
  description: A beautiful sword made almost entirely of silver. It's blade is dull and can't hold an edge, but perhaps it could be something more...
  components:
  - type: Sprite
    sprite: _DV/Objects/Weapons/Melee/silversword.rsi
  - type: MeleeWeapon
    damage:
      types:
        Slash: 15
  - type: Item
    sprite: _DV/Objects/Weapons/Melee/silversword.rsi
  - type: Construction
    graph: RadiantSword
    node: start
  - type: Clothing
    quickEquip: false
    slots:
    - back
    - suitStorage
    - belt
  - type: Tag
    tags:
      - SilverSword
  - type: RevealRevenantOnCollide
  - type: CollisionWake
    enabled: False

- type: entity
  parent: SilverSword
  id: EmbeddedSword
  name: bluespace embedded sword
  description: you didn't think just adding bluespace would make this a workable weapon, did you?
  components:
  - type: Sprite
    sprite: _DV/Objects/Weapons/Melee/silversword.rsi
    state: bluespace_embedded
  - type: Construction
    graph: RadiantSword
    node: embeddedsword

- type: entity
  parent: SilverSword
  id: RadiantSword
  name: radiant sword
  description: A silver sword infused with the light of a Chaplain's faith. While it remains ineffective against the physical, it is a powerful tool against those from beyond the veil.
  components:
  - type: Sprite
    sprite: _DV/Objects/Weapons/Melee/radiantsword.rsi
  - type: MeleeWeapon
    damage:
      types:
        Slash: 15
        Holy: 15
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    sprite: _DV/Objects/Weapons/Melee/radiantsword.rsi
  - type: Construction
    graph: RadiantSword
    node: radiantsword
  - type: RevealRevenantOnCollide
    revealTime: 10
  - type: CollisionWake
    enabled: false

- type: entity
  parent: BaseSword
  id: DualSwords
  name: dual swords
  description: A pair of weak but incredibly light swords.
  components:
  - type: Sprite
    sprite: _DV/Objects/Weapons/Melee/dualswords.rsi
  - type: MeleeWeapon
    autoAttack: true
    attackRate: 7
    wideAnimationRotation: 225
    swingLeft: true
    damage:
      types:
        Slash: 2
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Reflect
    reflectProb: .25
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Slash: 4.5
  - type: Item
    sprite: _DV/Objects/Weapons/Melee/dualswords.rsi
  - type: JumpAbility
    jumpDistance: 2.5
    jumpSound: /Audio/Effects/stealthoff.ogg
  - type: ActionGrant
    actions:
    - ActionGravityJump
  - type: ItemActionGrant
    actions:
    - ActionGravityJump
  - type: Clothing
    quickEquip: false
    slots:
    - back
    - suitStorage
